<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paarberatung Haas — Online &amp; Offline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --navy: #1b3d52;
      --mid: #2a5c74;
      --accent: #D98C2B;
      --white: #ffffff;
      --warm: #f5f3f0;
      --text: #1b3d52;
      --font: 'Inter', ui-sans-serif, system-ui, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font);
      font-size: 16px;
      font-weight: 300;
      color: var(--text);
      line-height: 1.7;
      background: var(--white);
    }

    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ── TYPOGRAPHY ─────────────────────────────── */
    .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(27, 61, 82, 0.5);
    }

    .title-hero {
      font-size: clamp(28px, 3.5vw, 52px);
      font-weight: 700;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      line-height: 1.05;
      color: var(--navy);
    }

    .title-section {
      font-size: clamp(32px, 4vw, 56px);
      font-weight: 700;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      line-height: 1.05;
      color: var(--navy);
    }

    .body-text {
      font-size: clamp(15px, 1.1vw, 18px);
      font-weight: 300;
      line-height: 1.75;
      color: var(--navy);
    }

    /* ── LAYOUT ─────────────────────────────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px;
    }

    .section {
      padding: 100px 0;
    }

    .section-sm {
      padding: 64px 0;
    }

    .section-alt {
      background: var(--warm);
    }

    .section-dark {
      background: var(--navy);
      color: #fff;
    }

    /* ── NAV ─────────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--white);
      border-bottom: 1px solid rgba(27, 61, 82, 0.12);
      transition: box-shadow 0.3s;
    }

    .nav.scrolled {
      box-shadow: 0 2px 20px rgba(27, 61, 82, 0.1);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--navy);
      cursor: pointer;
      transition: color 0.2s;
    }

    .nav-logo span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 40px;
    }

    .nav-link {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--navy);
      cursor: pointer;
      transition: color 0.2s;
      background: none;
      border: none;
    }

    .nav-link:hover {
      color: var(--accent);
    }

    .nav-link.active {
      color: var(--navy);
      border-bottom: 2px solid var(--accent);
      padding-bottom: 2px;
    }

    .nav-cta {
      background: var(--navy);
      color: #fff;
      padding: 12px 24px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    .nav-cta:hover {
      background: var(--mid);
    }

    /* ── BUTTONS ─────────────────────────────────── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--navy);
      color: #fff;
      padding: 18px 36px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      border: 2px solid var(--navy);
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-primary:hover {
      background: var(--mid);
      border-color: var(--mid);
    }

    .btn-accent {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--navy);
      color: #fff;
      padding: 18px 36px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      border: 2px solid var(--navy);
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-accent:hover {
      background: var(--mid);
      border-color: var(--mid);
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--navy);
      padding: 18px 36px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      border: 2px solid var(--navy);
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-outline:hover {
      background: var(--navy);
      color: #fff;
    }

    .btn-outline-white {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: #fff;
      padding: 18px 36px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      border: 2px solid rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-outline-white:hover {
      background: #fff;
      color: var(--navy);
      border-color: #fff;
    }

    .link-arrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--navy);
      border-bottom: 3px solid var(--accent);
      padding-bottom: 3px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .link-arrow:hover {
      color: var(--accent);
    }

    /* ── SERVICE CARD ───────────────────────────── */
    .service-card {
      background: var(--white);
      border: 1px solid var(--navy);
      padding: 48px;
      transition: box-shadow 0.25s;
    }

    .service-card:hover {
      box-shadow: 0 20px 60px rgba(27, 61, 82, 0.15);
    }

    .service-card-dark {
      background: var(--navy);
      border-top: 4px solid var(--accent);
      padding: 48px;
      color: #fff;
    }

    /* ── ACCENT ELEMENTS ────────────────────────── */
    .accent-bar {
      width: 48px;
      height: 4px;
      background: var(--accent);
      margin-bottom: 24px;
    }

    .accent-left {
      border-left: 4px solid var(--accent);
      padding-left: 24px;
    }

    /* ── FAQ ACCORDION ─────────────────────────── */
    .faq-item {
      border-bottom: 1px solid rgba(27, 61, 82, 0.15);
    }

    .faq-question {
      width: 100%;
      background: none;
      border: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0;
      font-family: var(--font);
      font-size: 17px;
      font-weight: 700;
      color: var(--navy);
      cursor: pointer;
      text-align: left;
    }

    .faq-answer {
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.35s ease;
      font-size: 16px;
      font-weight: 300;
      line-height: 1.75;
      color: var(--navy);
    }

    /* ── FORM ──────────────────────────────────── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--navy);
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 14px 16px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 300;
      color: var(--navy);
      background: var(--white);
      border: 1px solid rgba(27, 61, 82, 0.3);
      outline: none;
      transition: border-color 0.2s;
      border-radius: 0;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-color: var(--accent);
    }

    .form-textarea {
      resize: vertical;
      min-height: 120px;
    }

    /* ── TWEAKS PANEL ──────────────────────────── */
    .tweaks-panel {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--white);
      border: 1px solid var(--navy);
      padding: 24px;
      width: 280px;
      box-shadow: 0 20px 60px rgba(27, 61, 82, 0.2);
      z-index: 999;
      font-family: var(--font);
    }

    .tweaks-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .tweak-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .tweak-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .tweak-select,
    .tweak-input {
      font-family: var(--font);
      font-size: 12px;
      padding: 4px 8px;
      border: 1px solid rgba(27, 61, 82, 0.3);
      border-radius: 0;
      color: var(--navy);
      background: var(--white);
    }

    /* ── MOBILE ────────────────────────────────── */
    .hamburger {
      display: none;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }

      .hamburger {
        display: flex;
        flex-direction: column;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
      }

      .hamburger span {
        display: block;
        width: 24px;
        height: 2px;
        background: var(--navy);
      }

      .mobile-menu {
        position: fixed;
        inset: 0;
        background: var(--white);
        z-index: 200;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
      }

      .mobile-menu-link {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--navy);
        background: none;
        border: none;
        cursor: pointer;
      }

      .hero-grid {
        grid-template-columns: 1fr !important;
      }

      .hero-img-wrap {
        height: 340px !important;
        order: -1;
      }

      .services-grid {
        grid-template-columns: 1fr !important;
      }

      .about-grid {
        grid-template-columns: 1fr !important;
      }

      .two-col {
        grid-template-columns: 1fr !important;
      }

      .three-col {
        grid-template-columns: 1fr !important;
      }

      .section {
        padding: 64px 0;
      }

      .container {
        padding: 0 20px;
      }
    }
  </style>
</head>

<body>

  <script type="text/babel">

    const { useState, useEffect, useRef } = React;

    // ── TWEAKS DEFAULTS ──────────────────────────────────────────────────────────
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#D98C2B",
      "heroLayout": "split",
      "navStyle": "light"
    } /*EDITMODE-END*/;

    // ── ICONS ────────────────────────────────────────────────────────────────────
    const ArrowRight = () =>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" />
      </svg>;

    const ChevronDown = () =>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="6 9 12 15 18 9" />
      </svg>;

    const ChevronUp = () =>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="18 15 12 9 6 15" />
      </svg>;

    const X = () =>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
      </svg>;

    const Check = () =>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="20 6 9 17 4 12" />
      </svg>;

    const Mail = () =>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" /><polyline points="22,6 12,13 2,6" />
      </svg>;

    const Phone = () =>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.22 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16z" />
      </svg>;

    const MapPin = () =>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" />
      </svg>;


    // ── NAV ──────────────────────────────────────────────────────────────────────
    function Nav({ page, setPage }) {
      const [scrolled, setScrolled] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);

      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', fn);
        return () => window.removeEventListener('scroll', fn);
      }, []);

      const links = [
        { id: 'home', label: 'Start' },
        { id: 'leistungen', label: 'Leistungen' },
        { id: 'ueber', label: 'Über mich' },
        { id: 'faq', label: 'FAQ' },
        { id: 'kontakt', label: 'Kontakt' }];
      const subPages = ['paarberatung', 'lebensberatung'];


      const go = (id) => { setPage(id); setMenuOpen(false); window.scrollTo(0, 0); };

      return (
        <>
          <nav className={`nav${scrolled ? ' scrolled' : ''}`}>
            <div className="nav-inner">
              <button className="nav-logo" onClick={() => go('home')}>
                Haas<span style={{ color: 'var(--accent)' }}>.</span>Beratung
              </button>
              <div className="nav-links">
                {links.map((l) =>
                  <button key={l.id} className={`nav-link${page === l.id || (l.id === 'leistungen' && subPages.includes(page)) ? ' active' : ''}`} onClick={() => go(l.id)}>
                    {l.label}
                  </button>
                )}
                <button className="nav-cta" onClick={() => go('kontakt')}>Erstgespräch →</button>
              </div>
              <button className="hamburger" onClick={() => setMenuOpen(true)} aria-label="Menü">
                <span /><span /><span />
              </button>
            </div>
          </nav>

          {menuOpen &&
            <div className="mobile-menu">
              <button style={{ position: 'absolute', top: 24, right: 24, background: 'none', border: 'none', cursor: 'pointer' }} onClick={() => setMenuOpen(false)}><X /></button>
              {links.map((l) =>
                <button key={l.id} className="mobile-menu-link" onClick={() => go(l.id)}>{l.label}</button>
              )}
              <button className="btn-accent" onClick={() => go('kontakt')}>Erstgespräch anfragen <ArrowRight /></button>
            </div>
          }
        </>);

    }

    // ── HOME PAGE ────────────────────────────────────────────────────────────────
    function HomePage({ setPage }) {
      const go = (id) => { setPage(id); window.scrollTo(0, 0); };

      const painPoints = [
        'Gespräche eskalieren schneller, als du reagieren kannst',
        'Ihr dreht euch immer wieder im Kreis',
        'Du fühlst dich nicht gehört oder nicht verstanden',
        'Nähe ist im Alltag verloren gegangen',
        'Du bist unsicher, ob du bleiben oder gehen sollst',
        'Du analysierst alles – und kommst trotzdem nicht weiter'];


      const pillars = [
        { label: 'Wissenschaft', text: 'Validierte Methoden aus Verhaltenspsychologie und Systemischer Beratung.' },
        { label: 'Erfahrung', text: 'Über zehn Jahre Beratungspraxis in unterschiedlichsten Settings.' },
        { label: 'Persönlichkeit', text: 'Als ehemaliges Straßenkind habe ich Beziehungen selbst von Grund auf erlernen müssen.' }];


      const services = [
        { id: 'paarberatung', title: 'Paarberatung', sub: 'Für Paare', desc: 'Wenn ihr euch im Kreis dreht, emotional verloren habt oder das Schweigen lauter wird als jedes Gespräch.' },
        { id: 'lebensberatung', title: 'Lebensberatung', sub: 'Für Einzelpersonen', desc: 'Wenn du in einer persönlichen Krise steckst, vor einer wichtigen Entscheidung stehst oder deine eigenen Muster verstehen willst.' }];


      return (
        <main>
          {/* ── HERO ── */}
          <section style={{ paddingTop: 72, minHeight: '90vh', display: 'flex', alignItems: 'center', background: '#fff' }}>
            <div className="container" style={{ width: '100%' }}>
              <div className="hero-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 96, alignItems: 'center', minHeight: 'calc(90vh - 72px)', paddingTop: 80, paddingBottom: 80 }}>
                <div>
                  <div className="label" style={{ marginBottom: 24 }}>ONLINE & OFFLINE</div>
                  <h1 className="title-hero" style={{ marginBottom: 28, color: "rgb(27, 61, 82)" }}>
                    Klarheit für<br />
                    <span style={{ color: 'var(--accent)' }}>Beziehungen,</span><br />
                    Konflikte &amp;<br />
                    Wendepunkte.
                  </h1>
                  <p className="body-text" style={{ maxWidth: 480, marginBottom: 40 }}>
                    Wenn Gespräche immer wieder eskalieren, Nähe verloren geht oder du nicht mehr weißt, was du eigentlich fühlst oder willst – braucht es manchmal einen klaren Blick von außen.
                  </p>
                  <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap' }}>
                    <button className="btn-accent" onClick={() => go('kontakt')}>
                      Erstgespräch anfragen <ArrowRight />
                    </button>
                    <button className="btn-outline" onClick={() => go('leistungen')}>
                      Alle Leistungen
                    </button>
                  </div>

                </div>
                <div className="hero-img-wrap" style={{ height: '75vh', position: 'relative', overflow: 'hidden' }}>
                  <img src="uploads/DSC_8576.JPG" alt="Kim Haas – Beraterin" style={{ objectPosition: 'center top' }} />
                </div>
              </div>
            </div>
          </section>

          {/* ── PAIN POINTS ── */}
          <section className="section section-alt">
            <div className="container">
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 96, alignItems: 'end', marginBottom: 64 }} className="two-col">
                <div>
                  <h2 className="title-section">Kommt dir das bekannt vor?</h2>
                </div>
                <div style={{ borderLeft: '3px solid rgba(27,61,82,0.2)', paddingLeft: 28 }}>
                  <p className="body-text" style={{ fontStyle: 'italic', marginBottom: 12 }}>
                    „Es geht nicht um den vergessenen Joghurt. Es ging niemals um den Joghurt. Und doch kann an dem Joghurt auf einmal ein ganzes Universum einbrechen."
                  </p>
                  <p className="body-text" style={{ fontWeight: 700, fontSize: 14 }}>Das Problem ist, dass ihr die Dynamik dahinter nicht erkennt.</p>
                </div>
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 0 }} className="three-col">
                {painPoints.map((p, i) =>
                  <div key={i} style={{
                    padding: '28px 32px',
                    borderTop: '1px solid rgba(27,61,82,0.12)',
                    borderRight: i % 3 < 2 ? '1px solid rgba(27,61,82,0.12)' : 'none',
                  }}>
                    <span style={{ display: 'block', fontSize: 10, fontWeight: 700, letterSpacing: '0.4em', color: 'rgba(27,61,82,0.3)', marginBottom: 10 }}>{String(i + 1).padStart(2, '0')}</span>
                    <span className="body-text" style={{ fontSize: 15 }}>{p}</span>
                  </div>

            <div style={{ borderTop: '1px solid rgba(255,255,255,0.1)', paddingTop: 24, display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 300, color: 'rgba(255,255,255,0.4)' }}>© 2026 Kim Haas. Alle Rechte vorbehalten.</div>
              <div style={{ fontSize: 12, fontWeight: 300, color: 'rgba(255,255,255,0.4)' }}>Impressum · Datenschutz</div>
            </div>
          </div>
        </footer>);

    }

    // ── TWEAKS PANEL ─────────────────────────────────────────────────────────────
    function TweaksPanel({ tweaks, setTweaks }) {
      return (
        <div className="tweaks-panel">
          <div className="tweaks-title">Tweaks</div>
          <div className="tweak-row">
            <span className="tweak-label">Akzentfarbe</span>
            <input type="color" value={tweaks.accentColor} onChange={(e) => {
              const v = e.target.value;
              setTweaks((t) => ({ ...t, accentColor: v }));
              document.documentElement.style.setProperty('--accent', v);
              window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: v } }, '*');
            }} />
          </div>
          <div className="tweak-row">
            <span className="tweak-label">Hero-Layout</span>
            <select className="tweak-select" value={tweaks.heroLayout} onChange={(e) => {
              setTweaks((t) => ({ ...t, heroLayout: e.target.value }));
              window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { heroLayout: e.target.value } }, '*');
            }}>
              <option value="split">Split (Bild rechts)</option>
              <option value="center">Zentriert</option>
            </select>
          </div>
          <div className="tweak-row">
            <span className="tweak-label">Nav-Stil</span>
            <select className="tweak-select" value={tweaks.navStyle} onChange={(e) => {
              const v = e.target.value;
              setTweaks((t) => ({ ...t, navStyle: v }));
              window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { navStyle: v } }, '*');
            }}>
              <option value="light">Hell</option>
              <option value="dark">Dunkel</option>
            </select>
          </div>
        </div>);

    }

    // ── APP ───────────────────────────────────────────────────────────────────────
    function App() {
      const savedPage = localStorage.getItem('haas_page') || 'home';
      const [page, setPageState] = useState(savedPage);
      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
      const [showTweaks, setShowTweaks] = useState(false);

      const setPage = (id) => {
        setPageState(id);
        localStorage.setItem('haas_page', id);
      };

      // Apply tweaks on mount
      useEffect(() => {
        document.documentElement.style.setProperty('--accent', tweaks.accentColor);
      }, []);

      // Nav style tweak
      useEffect(() => {
        if (tweaks.navStyle === 'dark') {
          document.documentElement.style.setProperty('--nav-bg', 'var(--navy)');
        }
      }, [tweaks.navStyle]);

      // Tweaks protocol
      useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
          if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      return (
        <>
          <Nav page={page} setPage={setPage} />
          {page === 'home' && <HomePage setPage={setPage} />}
          {page === 'leistungen' && <LeistungenPage setPage={setPage} />}
          {page === 'paarberatung' && <PaarberatungPage setPage={setPage} />}
          {page === 'lebensberatung' && <LebensberatungPage setPage={setPage} />}
          {page === 'ueber' && <UeberPage setPage={setPage} />}
          {page === 'faq' && <FAQPage setPage={setPage} />}
          {page === 'kontakt' && <KontaktPage />}
          <Footer setPage={setPage} />
          {showTweaks && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} />}
        </>);

    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="80" fill="#1b3d52" />
      <rect x="20" y="20" width="40" height="40" fill="#D98C2B" opacity="0.3" />
      <text x="60" y="46" font-size="18" font-weight="bold" fill="white" text-anchor="middle"
        font-family="sans-serif">H</text>
    </svg>
  </template>
</body>

</html>
